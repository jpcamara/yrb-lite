development:
  # async = single process (default). Set CABLE_ADAPTER=redis to run multiple
  # server processes that share documents (e.g. the multi-process test).
  adapter: <%= ENV.fetch("CABLE_ADAPTER", "async") %>
  url: <%= ENV.fetch("REDIS_URL", "redis://localhost:6379/15") %>
  channel_prefix: yrby_demo_dev

test:
  adapter: test

production:
  adapter: redis
  url: <%= ENV.fetch("REDIS_URL") { "redis://localhost:6379/1" } %>
  channel_prefix: actioncable_demo_production
